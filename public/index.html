<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App – DSO101</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }
    h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 8px; }
    p.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #4f46e5; }
    button.add-btn {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.add-btn:hover { background: #4338ca; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    li:last-child { border-bottom: none; }
    li span {
      flex: 1;
      font-size: 1rem;
      color: #333;
      transition: all 0.2s;
    }
    li span.done {
      text-decoration: line-through;
      color: #aaa;
    }
    .check-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid #4f46e5;
      background: white;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .check-btn.checked { background: #4f46e5; color: white; }
    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .del-btn:hover { color: #ef4444; }
    .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>
    <p class="subtitle">DSO101 – Assignment 3</p>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <ul id="todoList"></ul>
    <p class="empty" id="emptyMsg">No tasks yet. Add one above!</p>
  </div>

  <script>
    async function loadTodos() {
      const res = await fetch('/api/todos');
      const todos = await res.json();
      renderTodos(todos);
    }

    function renderTodos(todos) {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyMsg');
      list.innerHTML = '';
      empty.style.display = todos.length === 0 ? 'block' : 'none';
      todos.forEach(todo => {
        const li = document.createElement('li');
        li.innerHTML = `
          <button class="check-btn ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})">
            ${todo.completed ? '✓' : ''}
          </button>
          <span class="${todo.completed ? 'done' : ''}">${todo.text}</span>
          <button class="del-btn" onclick="deleteTodo(${todo.id})">✕</button>
        `;
        list.appendChild(li);
      });
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      await fetch('/api/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id) {
      await fetch(`/api/todos/${id}`, { method: 'PUT' });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    document.getElementById('todoInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTodo();
    });

    loadTodos();
  </script>
</body>
</html>
